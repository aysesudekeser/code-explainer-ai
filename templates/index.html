<!DOCTYPE html>
<html>
<head>
    <title>Code Explainer AI</title>
</head>
<style>

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    
    .container {
        width: 800px;
        background: #1e293b;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
    
    h1 {
        margin-bottom: 20px;
        text-align: center;
    }
    
    textarea {
        width: 100%;
        height: 250px;
        background: #0f172a;
        color: white;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 15px;
        font-size: 15px;
        resize: none;
    }
    
    button {
        width: 100%;
        margin-top: 20px;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    
    button:hover {
        background: #2563eb;
    }
    
    #result {
        margin-top: 20px;
        background: #0f172a;
        padding: 20px;
        border-radius: 10px;
        min-height: 80px;
        line-height: 1.6;
    }
    
    </style>
<body>

    <div class="container">

        <h1>AI Code Explainer</h1>

        <textarea
            id="code"
            placeholder="Paste your code here..."
        ></textarea>

        <button onclick="explainCode()">
            Explain Code
        </button>

        <div id="result"></div>

    </div>

    <script>

        async function explainCode() {

            const code = document.getElementById("code").value;

            const response = await fetch("/explain", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    code: code
                })

            });

            const data = await response.json();

            document.getElementById("result").innerText =
                data.response;
        }

    </script>

</body>
</html>
